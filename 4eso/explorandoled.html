<!DOCTYPE html>
<html lang="gl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Flash - Ruffle</title>
    <style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* O contenedor principal que define o tamaño */
        #flash-container {
            width: 95%; /* Responsive en pantallas pequenas */
            max-width: 1080px; /* Tamaño máximo que pediches */
            height: 720px; /* Axusta esta altura se o teu SWF é máis alto/baixo */
            background-color: #000; /* Fondo negro para evitar o branco se non cadra a proporción */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
        }

        /* ESTA É A CLAVE: Forzar ao reprodutor de Ruffle a encher o div */
        ruffle-player {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>
<body>

    <div id="flash-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("flash-container");
            
            container.appendChild(player);
            
            player.load({
                url: "https://tecnomgb.github.io/tecnoloxia/4eso/unidade2/recursos/animacions/explorando_leds.swf",
                backgroundColor: "#ffffff",
                autoplay: "on",
                unmuteOverlay: "hidden",
                // 'letterbox' mantén a proporción. Se queres que estire totalmente
                // ata os bordos aínda que se deforme, cambia "on" por "off".
                letterbox: "on" 
            });
        });
    </script>

</body>
</html>
